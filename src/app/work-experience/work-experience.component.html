<h2>Work Experience</h2>
<div *ngIf="formArray && formArray.controls.length > 0" formArrayName="workExperiences">
  <div *ngFor="let workExperience of formArray.controls; let i = index; trackBy: trackByFn" [formGroupName]="i" class="mb-3">
    <div class="mb-3">
      <label for="companyName" class="form-label">Company Name</label>
      <input type="text" id="companyName" class="form-control" formControlName="companyName">
    </div>
    <div class="mb-3">
      <label for="position" class="form-label">Position</label>
      <input type="text" id="position" class="form-control" formControlName="position">
    </div>
    <div class="mb-3">
      <label for="startDate" class="form-label">Start Date</label>
      <input type="date" id="startDate" class="form-control" formControlName="startDate">
    </div>
    <div class="mb-3">
      <label for="endDate" class="form-label">End Date</label>
      <input type="date" id="endDate" class="form-control" formControlName="endDate">
    </div>
    <div class="mb-3">
      <label for="location" class="form-label">Location</label>
      <input type="text" id="location" class="form-control" formControlName="location">
    </div>
    <div class="mb-3">
      <label for="description" class="form-label">Description</label>
      <textarea id="description" class="form-control" formControlName="description"></textarea>
    </div>
    <button type="button" class="btn btn-danger" (click)="onRemoveWorkExperience(i)">Remove</button>
  </div>
</div>
<!-- <button type="button" class="btn btn-secondary" (click)="onAddWorkExperience()">Add Work Experience</button> -->
