<div class="builder-layout">
    <div class="row g-0 h-100">
      <!-- Side Navigation Bar -->
      <div class="col-md-3 col-lg-2 sidebar-wrapper">
        <app-sections [currentSection]="currentSection()" [completionPercentage]="completionPercentage()" (sectionChange)="showSection($event)"></app-sections>
      </div>
  
      <!-- Main Form Section -->
      <main class="col-md-9 col-lg-10 main-scroll-area bg-subtle">
        <div class="container-fluid py-5 px-md-5">
            <div class="row justify-content-center">
                <div class="col-xl-9 animate-fade-in">
                    <div class="modern-card p-4 p-md-5 mb-4 shadow-xl border-0">
                        @if (currentSection() === 'personalDetails') {
                            <app-personal-details
                                [personalDetailsForm]="personalDetails"
                                (nextSection)="onPersonalDetailsSaveAndContinue()">
                            </app-personal-details>
                        }

                        @if (currentSection() === 'workExperience') {
                            <app-work-experience 
                                [workExperienceForm]="form"
                                [formArray]="workExperiences"
                                (addWorkExperience)="addWorkExperience()"
                                (removeWorkExperience)="removeWorkExperience($event)">
                            </app-work-experience>
                        }

                        @if (currentSection() === 'education') {
                            <app-education-details 
                                [educationDetailsForm]="form"
                                [formArray]="educationDetails"
                                (addEducation)="addEducation()"
                                (removeEducation)="removeEducation($event)">
                            </app-education-details>
                        }
                    </div>

                    <!-- Builder Actions (Optional Global Actions) -->
                    <div class="d-flex justify-content-between align-items-center mt-5">
                        @if (currentSection() !== 'personalDetails') {
                            <button class="btn btn-light rounded-pill px-4 fw-semibold" (click)="showSection('personalDetails')">
                                Back
                            </button>
                        } @else {
                            <div></div>
                        }
                        <div class="ms-auto d-flex gap-3">
                            @if (currentSection() === 'workExperience') {
                                <button type="button" class="btn btn-outline-primary rounded-pill px-4 fw-semibold" (click)="addWorkExperience()">
                                    + Add Experience
                                </button>
                            }
                            @if (currentSection() === 'education') {
                                <button type="button" class="btn btn-outline-primary rounded-pill px-4 fw-semibold" (click)="addEducation()">
                                    + Add Education
                                </button>
                            }
                            <button type="button" class="btn-vibrant px-5 shadow-lg" (click)="submitResume()" [disabled]="isSaving()">
                                {{ isSaving() ? 'Saving...' : 'Save Complete Resume' }}
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
      </main>
    </div>
</div>
