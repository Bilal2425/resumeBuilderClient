<div class="form-section">
    <div class="d-flex align-items-center mb-4">
        <div class="section-icon me-3 bg-primary-soft text-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
        <h2 class="mb-0">Personal Details</h2>
    </div>

    <form [formGroup]="personalDetailsForm" (ngSubmit)="onSubmit()">
        <div class="row g-3">
            <div class="col-md-6">
                <label for="firstName" class="form-label">First Name</label>
                <input type="text" id="firstName" class="form-control" formControlName="firstName" placeholder="John">
            </div>
            <div class="col-md-6">
                <label for="lastName" class="form-label">Last Name</label>
                <input type="text" id="lastName" class="form-control" formControlName="lastName" placeholder="Doe">
            </div>
            <div class="col-12">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" formControlName="email" placeholder="john.doe@example.com">
            </div>
            <div class="col-md-6">
                <label for="phoneNumber" class="form-label">Phone Number</label>
                <input type="text" id="phoneNumber" class="form-control" formControlName="phoneNumber" placeholder="+1 (555) 000-0000">
            </div>
            <div class="col-md-6">
                <label for="location" class="form-label">Location</label>
                <input type="text" id="location" class="form-control" formControlName="location" placeholder="City, State">
            </div>
        </div>

        <div class="mt-5 d-flex justify-content-end">
            <button type="submit" class="btn-vibrant px-5">Save and Continue</button>
        </div>
    </form>
</div>
