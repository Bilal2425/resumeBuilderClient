<div class="sidebar-container h-100">
  <div class="sidebar-header px-4 py-4">
    <h6 class="text-uppercase text-muted fw-bold small mb-0">Resume Sections</h6>
  </div>
  
  <nav class="nav flex-column px-2">
    <a class="nav-link mb-2 d-flex align-items-center" 
       [class.active]="currentSection === 'personalDetails'"
       (click)="navigate('personalDetails')">
      <div class="icon-box me-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      </div>
      <span>Personal Details</span>
    </a>

    <a class="nav-link mb-2 d-flex align-items-center" 
       [class.active]="currentSection === 'workExperience'"
       (click)="navigate('workExperience')">
      <div class="icon-box me-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
      </div>
      <span>Work Experience</span>
    </a>

    <a class="nav-link mb-2 d-flex align-items-center" 
       [class.active]="currentSection === 'education'"
       (click)="navigate('education')">
      <div class="icon-box me-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c3 3 9 3 12 0v-5"></path></svg>
      </div>
      <span>Education</span>
    </a>
  </nav>

  <div class="sidebar-footer mt-auto p-4 border-top">
    <div class="progress-container mb-2">
      <div class="d-flex justify-content-between small mb-1">
        <span class="text-muted">Completion</span>
        <span class="fw-bold">60%</span>
      </div>
      <div class="progress" style="height: 6px;">
        <div class="progress-bar bg-primary" role="progressbar" style="width: 60%" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100"></div>
      </div>
    </div>
  </div>
</div>
